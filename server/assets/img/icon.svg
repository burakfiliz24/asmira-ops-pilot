<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1120"/>
      <stop offset="100%" style="stop-color:#0f1e3a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring glow -->
  <circle cx="256" cy="240" r="160" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.3"/>
  <!-- Ship/Anchor symbol -->
  <g transform="translate(256,220)" fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Anchor ring -->
    <circle cx="0" cy="-80" r="24" stroke-width="7"/>
    <!-- Anchor shaft -->
    <line x1="0" y1="-56" x2="0" y2="60"/>
    <!-- Anchor crossbar -->
    <line x1="-50" y1="-10" x2="50" y2="-10"/>
    <!-- Anchor flukes -->
    <path d="M0,60 Q-60,40 -65,10" stroke-width="7"/>
    <path d="M0,60 Q60,40 65,10" stroke-width="7"/>
    <!-- Fluke tips -->
    <line x1="-65" y1="10" x2="-50" y2="-5" stroke-width="6"/>
    <line x1="65" y1="10" x2="50" y2="-5" stroke-width="6"/>
  </g>
  <!-- Waves -->
  <path d="M80,380 Q130,360 180,380 Q230,400 280,380 Q330,360 380,380 Q430,400 432,380" fill="none" stroke="url(#wave)" stroke-width="5" stroke-linecap="round"/>
  <path d="M100,405 Q150,385 200,405 Q250,425 300,405 Q350,385 400,405 Q420,415 420,405" fill="none" stroke="url(#wave)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Text: ASMIRA -->
  <text x="256" y="462" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="42" letter-spacing="12" fill="white" opacity="0.9">ASMIRA</text>
  <text x="256" y="488" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="18" letter-spacing="6" fill="#60a5fa" opacity="0.7">OPS</text>
</svg>
